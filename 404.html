<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Page not found | Midlands Made</title>
<meta name="theme-color" content="#080b14" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<style>
  :root{--bg:#080b14;--ink:#f4f6fb;--muted:#94a0b8;--line2:#28324c;--grad:linear-gradient(100deg,#5b7cfa 0%,#38bdf8 100%)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;line-height:1.6;
    background-image:radial-gradient(900px 500px at 80% -10%,rgba(34,211,238,.09),transparent 60%),radial-gradient(800px 500px at 0% 10%,rgba(109,112,246,.12),transparent 55%)}
  .box{max-width:480px}
  .code{font-family:'Poppins',system-ui,sans-serif;font-weight:800;font-size:5rem;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.1}
  h1{font-family:'Poppins',system-ui,sans-serif;font-weight:700;font-size:1.5rem;margin:10px 0 12px;color:#fff}
  p{color:var(--muted);margin-bottom:26px}
  a.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Poppins',system-ui,sans-serif;font-weight:600;font-size:.95rem;padding:13px 24px;border-radius:12px;background:var(--grad);color:#fff;text-decoration:none;box-shadow:0 10px 26px -10px rgba(109,112,246,.75);transition:transform .18s}
  a.btn:hover{transform:translateY(-2px)}
  .home{margin-top:16px;font-size:.88rem;color:var(--muted)}
  .home a{color:#c3c8d2}
</style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>That page doesn't exist</h1>
    <p>The address might be mistyped, or the page has moved. Everything Midlands Made lives on the one page anyway.</p>
    <a class="btn" href="/">Back to the homepage →</a>
    <p class="home">Or ring <a href="tel:+353851161036">085 116 1036</a></p>
  </div>
</body>
</html>
