<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
<style>
:root{--char:#17110d;--panel:#201813;--cream:#f5ede3;--muted:#b0a297;--ember:#ff7a1a;--ember2:#ffab52;--red:#c40606;--line:rgba(255,255,255,.10)}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-color:var(--ember) #140f0b;scrollbar-width:thin}
body{background:var(--char);color:var(--cream);font-family:'Manrope',system-ui,sans-serif;line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:12px}::-webkit-scrollbar-track{background:#140f0b}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--ember2),var(--red));border-radius:10px;border:3px solid #140f0b}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
.ic{width:1em;height:1em;display:inline-block;vertical-align:-0.15em}
nav{position:sticky;top:0;z-index:50;background:rgba(23,17,13,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
nav .wrap{display:flex;align-items:center;gap:20px;height:76px}
.brand{display:flex;align-items:center;gap:12px}
.brand .mark{display:grid;place-items:center}
.brand .mark .ic{font-size:46px;color:var(--ember2);filter:drop-shadow(0 3px 8px rgba(255,122,26,.28))}
.brand b{font-family:'Playfair Display',serif;font-size:24px;font-weight:800}
.brand b em{font-style:italic;color:var(--ember2)}
.brand span{display:block;font-size:9px;letter-spacing:2.4px;text-transform:uppercase;color:var(--muted);margin-top:3px}
.nav-cta{margin-left:auto;display:flex;gap:9px}
.cta{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--red),var(--ember));color:#fff;padding:12px 18px;border-radius:11px;font-weight:800;box-shadow:0 10px 26px -12px rgba(255,122,26,.6)}
.cta.ghost{background:rgba(255,255,255,.04);border:1px solid var(--line);box-shadow:none}
.cta .ic{font-size:17px}
.head{text-align:center;padding:52px 0 30px}
.kicker{font-size:11.5px;letter-spacing:4px;text-transform:uppercase;color:var(--ember2);font-weight:800}
h1{font-family:'Playfair Display',serif;font-weight:800;font-size:clamp(30px,5vw,48px);margin:12px 0}
.head p{color:var(--muted);max-width:560px;margin:0 auto}
.grid{columns:4 260px;column-gap:14px;padding-bottom:60px}
.gitem{break-inside:avoid;margin-bottom:14px;border-radius:14px;overflow:hidden;border:1px solid var(--line);cursor:zoom-in;position:relative;background:#0e0a07}
.gitem img{width:100%;transition:transform .5s}
.gitem:hover img{transform:scale(1.05)}
.gitem .cap{position:absolute;left:0;right:0;bottom:0;padding:14px 14px 12px;background:linear-gradient(180deg,transparent,rgba(13,9,6,.85));color:#fff;font-weight:700;font-size:13px;opacity:0;transition:opacity .25s}
.gitem:hover .cap{opacity:1}
.lb{position:fixed;inset:0;background:rgba(8,5,3,.94);z-index:90;display:none;align-items:center;justify-content:center;padding:24px}
.lb.on{display:flex}
.lb img{max-width:92vw;max-height:86vh;border-radius:12px}
.lb .x{position:absolute;top:18px;right:24px;font-size:22px;width:44px;height:44px;border:1px solid rgba(255,255,255,.3);border-radius:50%;color:#fff;display:grid;place-items:center;cursor:pointer}
footer{border-top:1px solid var(--line);padding:26px 0;color:var(--muted);font-size:13px}
footer .wrap{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}
footer a{color:var(--ember2)}
@media(max-width:600px){.grid{columns:2 150px;column-gap:10px}.gitem{margin-bottom:10px}.brand span{display:none}.brand b{font-size:20px}}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<symbol id="i-flame" viewBox="0 0 24 24"><path d="M12 3c.7 2.6-.6 4-1.8 5.3C9 9.6 8.1 11 8.1 12.6a3.9 3.9 0 0 0 7.8 0c0-1.6-.7-2.8-1.4-3.7-.3.6-.7 1-1.3 1.3.5-2.5-.6-4.6-1.2-5.5z" fill="currentColor"/></symbol>
<symbol id="i-stovemark" viewBox="0 0 64 64"><g fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M32 21V10"/><path d="M32 10h6.5"/><rect x="15" y="21" width="34" height="29" rx="6"/><rect x="21" y="28.5" width="22" height="15.5" rx="2.6"/><path d="M20.5 50l-3 6M43.5 50l3 6"/></g><path d="M32 31c1.3 2.4-.8 3.7-1.1 5.2a2.5 2.5 0 0 0 4.9.9c.3-1.7-.7-3-1.2-4 1.5.6 2.3 1.7 2.3 3.2a4.3 4.3 0 1 1-7.2-3.1c1.1-.8 1.8-1.6 2.3-2.2z" fill="#ff8a2a"/></symbol>
<symbol id="i-phone" viewBox="0 0 24 24"><path d="M6.6 10.9a15 15 0 0 0 6.5 6.5l2.2-2.2a1 1 0 0 1 1-.25 11 11 0 0 0 3.4.55 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.3a1 1 0 0 1 1 1 11 11 0 0 0 .54 3.4 1 1 0 0 1-.24 1z" fill="currentColor"/></symbol>
</defs></svg>

<nav><div class="wrap">
  <a class="brand" href="index.html">
    <span class="mark"><svg class="ic"><use href="#i-stovemark"/></svg></span>
    <span><b>Kildare <em>Stoves</em></b><span>Stove &amp; Fireplace Specialists</span></span>
  </a>
  <div class="nav-cta">
    <a class="cta ghost" href="index.html#shop">All stoves</a>
    <a class="cta" href="tel:+353455531563"><svg class="ic"><use href="#i-phone"/></svg> 045 531563</a>
  </div>
</div></nav>

<div class="wrap">
  <div class="head">
    <span class="kicker">Our work</span>
    <h1>Gallery</h1>
    <p>A selection of stoves and fireplaces we've supplied and fitted in homes across Kildare and beyond.</p>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="lb" id="lb"><span class="x" id="lbx">&times;</span><img id="lbimg" src="" alt=""></div>

<footer><div class="wrap">
  <div>© <span id="yr"></span> Kildare Stoves · Monasterevin Road, Co. Kildare · R51 XK64</div>
  <div>Website by <a href="https://midlandsmade.ie" target="_blank" rel="noopener">Midlands Made</a></div>
</div></footer>

<script>
document.getElementById('yr').textContent=new Date().getFullYear();
const imgs=[
 ["Kratki_Koza_K9.jpg","Kratki Koza K9"],["Kratki-Zuzia.jpg","Kratki Zuzia"],["Henley_Druid_238.jpg","Henley Druid"],
 ["Kratki_Zosia.jpg","Kratki Zosia"],["Adler-Morano.jpg","Adler Morano"],["Kratki_Arke.jpg","Kratki Arke"],
 ["Henley_Druid_Double_Sided_2.jpg","Henley Druid — double-sided"],["Heat_Design_Vitae_2479.jpg","Heat Design Vitae"],
 ["Henley_Sherwood_432.jpg","Henley Sherwood"],["Henley_Achill_4628.jpg","Henley Achill"],["Installation_78327.jpg","A recent installation"],
 ["Artel_Subtile_Slimline_6.jpg","Artel Subtile Slimline 6"],["Heat_Design_Vitae_3.jpg","Heat Design Vitae"],["Adler_Merano_2.jpg","Adler Merano"],
 ["Kratki_Koza_K5_S.jpg","Kratki Koza K5 S"],["Adler_Merano_6437.jpg","Adler Merano"],["Palestro.jpg","Palestro"],["Henley_Sherwood.jpg","Henley Sherwood"],
 ["HD-Vitae-6-Cassette-Stove.jpg","Heat Design Vitae 6 cassette"],["Henley-Elm-8kW.jpg","Henley Elm 8kW pellet"],["kratki-zuzia-1.jpg","Kratki Zuzia insert"],
 ["Nordflam-Bremo.jpg","Nordflam Brema"],["Norflam-Werona-9kW.jpg","Nordflam Werona 9kW"],["vitae-11kw.jpg","Heat Design Vitae 11kW"]
];
const grid=document.getElementById('grid'),lb=document.getElementById('lb'),lbimg=document.getElementById('lbimg');
imgs.forEach(([f,cap])=>{
  const a=document.createElement('div');a.className='gitem';
  a.innerHTML='<img src="./assets/gallery/'+f+'" alt="'+cap+'"><span class="cap">'+cap+'</span>';
  const im=a.querySelector('img');
  im.onerror=()=>a.remove();
  a.onclick=()=>{lbimg.src=im.src;lb.classList.add('on');};
  grid.appendChild(a);
});
document.getElementById('lbx').onclick=()=>lb.classList.remove('on');
lb.onclick=e=>{if(e.target===lb)lb.classList.remove('on');};
addEventListener('keydown',e=>{if(e.key==='Escape')lb.classList.remove('on');});
</script>
</body>
</html>
